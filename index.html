<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Expense Tracker</h1>

         <div class="balance-card">
        <p>Current Balance</p>
        <h2>₹<span id="balance">0</span></h2>
    </div>

    <div class="summary">
        <div class="income-box">
            <p>Income</p>
            <h3>₹<span id="income">0</span></h3>
        </div>
        <div class="expense-box">
            <p>Expense</p>
            <h3>₹<span id="expense">0</span></h3>
        </div>
    </div>

       <div class="form">
        <input type="text" id="text" placeholder="Description">
        <input type="number" id="amount" placeholder="Amount">

        <div class="buttons">
            <button id="incomeBtn">+ Add Income</button>
            <button id="expenseBtn">- Add Expense</button>
        </div>
    </div>
    
      <select id="filter">
        <option value="all">All</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>

    <div class="note">
         <h3>History</h3>
        <ul id="list"> 
            <button id="clearBtn">Clear History</button>
        </ul>
    </div>
    </div>       

    <script src="script.js"></script>
</body>
</html>
